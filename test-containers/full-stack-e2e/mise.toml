[tasks."images:build"]
description = "Build repo-owned container images for full-stack Helm E2E"
depends = [
  "//apps/mail-control-service:image:build",
  "//apps/web-server:image:build",
]
run = "true"

[tasks.test]
description = "Run the full-stack Helm/kind end-to-end harness"
depends = [":images:build"]
dir = "{{config_root}}"
run = "node ./full-stack-e2e.mjs"
