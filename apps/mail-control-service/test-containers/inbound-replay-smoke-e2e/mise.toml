[tasks."build:go-runner"]
description = "Build service-owned Go test runner image"
depends = ["//apps/mail-control-service/test-containers/go-testing-container:build"]
run = "true"

[tasks.build]
description = "Build images required by the inbound replay smoke test"
depends = ["build:go-runner"]
run = "true"

[tasks.test]
description = "Run inbound replay smoke test via Go Testcontainers"
depends = ["build"]
run = """
: "${WT:?missing WT}"
runner_image="atemail.${WT}.mail-control-service-go-testing-container"
bash "../go-testing-container/scripts/run-go-test-with-artifacts.sh" \
  "agentteam/mail-control-service" \
  "inbound-replay-smoke-e2e" \
  "$(pwd)" \
  "localhost/${runner_image}:base" \
  -timeout 5m \
  .
"""
