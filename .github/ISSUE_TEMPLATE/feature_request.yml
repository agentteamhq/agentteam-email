name: Feature Request
description: Suggest an improvement or new capability for AgentTeam Email.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Keep requests focused on current
        product behavior and do not include private operational details.
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should change, and why?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Add workflow, API, deployment, or UX details that would help evaluate the request.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Optional.
      options:
        - App
        - Deployment
        - Docs
        - Development
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional context about other approaches or current workarounds.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add links, screenshots, or examples that help explain the request.
