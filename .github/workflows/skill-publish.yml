name: Skill Publish

on:
  pull_request:
    paths:
      - '.github/workflows/skill-publish.yml'
      - 'apps/at-email-cli/SKILL.md'
      - 'skills/**'
      - 'skills.sh.json'
  push:
    branches: ['main']
    paths:
      - '.github/workflows/skill-publish.yml'
      - 'apps/at-email-cli/SKILL.md'
      - 'skills/**'
      - 'skills.sh.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview the ClawHub publish without mutating the registry.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-clawhub-skills:
    name: Publish ClawHub Skills
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@v1
    with:
      root: skills
      owner: agentteamhq
      dry_run: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
      ref: ${{ github.sha }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
