name: Build, Test & Deploy

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  DO_NOT_TRACK: 1
  ASTRO_TELEMETRY_DISABLED: 1
  BETTER_AUTH_TELEMETRY: 0
  PUBLIC_HOSTNAME: ${{ vars.PUBLIC_HOSTNAME }}

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.release.outputs.is_release }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      is_stable: ${{ steps.release.outputs.is_stable }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release version
        id: release
        run: |
          is_release=false
          is_prerelease=false
          is_stable=false
          version=not-a-release
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
              echo "release tags must be vX.Y.Z or vX.Y.Z-rc.N" >&2
              exit 1
            fi
            version="${tag#v}"
            is_release=true
            if [[ "${version}" == *-* ]]; then
              is_prerelease=true
            else
              is_stable=true
            fi
          elif [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "workflow_dispatch must run from main or a release tag" >&2
            exit 1
          fi
          {
            echo "is_release=${is_release}"
            echo "is_prerelease=${is_prerelease}"
            echo "is_stable=${is_stable}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Go for at-email CLI package validation
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/at-email-cli/go.mod

      - name: Set up Node for at-email CLI npm package validation
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check at-email CLI GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.16.0
          args: check
          workdir: apps/at-email-cli

      - name: Require public hostname
        run: ': "${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME repository variable is required}"'

      - name: Build complete development environment image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web-server/Containerfile
          target: build
          load: true
          tags: atemail-web-server:build
          build-args: |
            PUBLIC_HOSTNAME=${{ env.PUBLIC_HOSTNAME }}
          cache-from: |
            type=gha,scope=prod-web-server
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-web-server:latest
          cache-to: type=gha,mode=max,scope=prod-web-server

      - name: Build web server production runtime dist stage for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web-server/Containerfile
          load: true
          tags: atemail-web-server:test
          build-args: |
            PUBLIC_HOSTNAME=${{ env.PUBLIC_HOSTNAME }}
          cache-from: |
            type=gha,scope=prod-web-server
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-web-server:latest
          cache-to: type=gha,mode=max,scope=prod-web-server

      - name: Build mail control service production runtime image for testing
        uses: docker/build-push-action@v6
        with:
          context: ./apps/mail-control-service
          file: ./apps/mail-control-service/Containerfile
          load: true
          tags: atemail-mail-control-service:test
          cache-from: |
            type=gha,scope=prod-mail-control-service
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-mail-control-service:latest
          cache-to: type=gha,mode=max,scope=prod-mail-control-service

      - name: Build at-email CLI test stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/at-email-cli/Containerfile
          target: test
          load: true
          tags: atemail-cli:test-stage
          cache-from: |
            type=gha,scope=prod-at-email-cli
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-cli:latest
          cache-to: type=gha,mode=max,scope=prod-at-email-cli

      - name: Build at-email CLI production runtime image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/at-email-cli/Containerfile
          load: true
          tags: atemail-cli:test
          cache-from: |
            type=gha,scope=prod-at-email-cli
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-cli:latest
          cache-to: type=gha,mode=max,scope=prod-at-email-cli

      - name: Run unit and integration tests
        run: |
          docker run \
            -e CI=true \
            -e DEBUG='*' \
            -e DOCKER_IMAGE=atemail-web-server:test \
            -v "$PWD:$PWD" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            atemail-web-server:build \
            pnpm run test

      - name: Stage at-email CLI embedded skill
        run: node apps/at-email-cli/skills/stage-skill.mjs

      - name: Build at-email CLI snapshot release binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.16.0
          args: release --snapshot --clean
          workdir: apps/at-email-cli

      - name: Generate at-email CLI npm packages
        run: node apps/at-email-cli/npm/generate-npm-packages.mjs

      - name: Validate at-email CLI npm packages
        run: node apps/at-email-cli/npm/validate-npm-packages.mjs

      - name: Pack at-email CLI npm packages
        run: node apps/at-email-cli/npm/pack-npm-packages.mjs

      - name: Smoke-test at-email CLI npm packages on glibc and musl
        run: node apps/at-email-cli/npm/smoke-npm-linux.mjs --engine docker

      - name: Generate at-email CLI plugin bundles
        run: node apps/at-email-cli/plugins/generate-plugin-bundles.mjs

      - name: Validate at-email CLI plugin bundles
        run: node apps/at-email-cli/plugins/validate-plugin-bundles.mjs

      - name: Pack at-email CLI plugin bundles
        run: node apps/at-email-cli/plugins/pack-plugin-bundles.mjs

      - name: Validate at-email CLI skill discovery
        run: node apps/at-email-cli/skills/validate-skill-discovery.mjs

  publish_release:
    name: Publish Release
    needs: build_test
    if: needs.build_test.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: write
      packages: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.5

      - name: Set up Go for at-email CLI release
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/at-email-cli/go.mod

      - name: Set up Node for at-email CLI npm release
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Require public hostname
        run: ': "${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME repository variable is required}"'

      - name: Declare web server docker image meta tags
        id: meta_web_server
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository }}/atemail-web-server
          tags: |
            type=edge,branch=main
            type=sha,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.build_test.outputs.version }},enable=${{ needs.build_test.outputs.is_release == 'true' }}
            type=raw,value=next,enable=${{ needs.build_test.outputs.is_prerelease == 'true' }}
            type=raw,value=latest,enable=${{ needs.build_test.outputs.is_stable == 'true' }}
          flavor: |
            latest=false

      - name: Declare mail control service docker image meta tags
        id: meta_mail_control_service
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository }}/atemail-mail-control-service
          tags: |
            type=edge,branch=main
            type=sha,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.build_test.outputs.version }},enable=${{ needs.build_test.outputs.is_release == 'true' }}
            type=raw,value=next,enable=${{ needs.build_test.outputs.is_prerelease == 'true' }}
            type=raw,value=latest,enable=${{ needs.build_test.outputs.is_stable == 'true' }}
          flavor: |
            latest=false

      - name: Declare at-email CLI docker image meta tags
        id: meta_at_email_cli
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository }}/atemail-cli
          tags: |
            type=edge,branch=main
            type=sha,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.build_test.outputs.version }},enable=${{ needs.build_test.outputs.is_release == 'true' }}
            type=raw,value=next,enable=${{ needs.build_test.outputs.is_prerelease == 'true' }}
            type=raw,value=latest,enable=${{ needs.build_test.outputs.is_stable == 'true' }}
          flavor: |
            latest=false

      - name: Auth to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve published image metadata
        id: image_metadata
        env:
          IS_RELEASE: ${{ needs.build_test.outputs.is_release }}
          RELEASE_VERSION: ${{ needs.build_test.outputs.version }}
        run: |
          version=edge
          if [[ "${IS_RELEASE}" == "true" ]]; then
            version="${RELEASE_VERSION}"
          fi
          {
            echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "vcs_ref=${GITHUB_SHA}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Stage at-email CLI embedded skill
        run: node apps/at-email-cli/skills/stage-skill.mjs

      - name: Publish at-email CLI release binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.16.0
          args: release --clean
          workdir: apps/at-email-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest at-email CLI release binaries
        uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: apps/at-email-cli/dist/checksums.txt

      - name: Attest at-email CLI checksums manifest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: apps/at-email-cli/dist/checksums.txt

      - name: Generate at-email CLI plugin release bundles
        run: node apps/at-email-cli/plugins/generate-plugin-bundles.mjs --expected-version "${{ needs.build_test.outputs.version }}"

      - name: Validate at-email CLI plugin release bundles
        run: node apps/at-email-cli/plugins/validate-plugin-bundles.mjs

      - name: Pack at-email CLI plugin release bundles
        run: node apps/at-email-cli/plugins/pack-plugin-bundles.mjs

      - name: Attest at-email CLI plugin bundle tarballs
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: apps/at-email-cli/dist/plugin-bundles/*.tar.gz

      - name: Upload at-email CLI plugin bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" apps/at-email-cli/dist/plugin-bundles/*.tar.gz --clobber

      - name: Publish web server production image (multi-arch)
        id: publish_web_server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web-server/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_web_server.outputs.tags }}
          labels: ${{ steps.meta_web_server.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.image_metadata.outputs.build_date }}
            PUBLIC_HOSTNAME=${{ env.PUBLIC_HOSTNAME }}
            VCS_REF=${{ steps.image_metadata.outputs.vcs_ref }}
            VERSION=${{ steps.image_metadata.outputs.version }}
          cache-from: |
            type=gha,scope=prod-web-server
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-web-server:latest
          cache-to: |
            type=gha,mode=max,scope=prod-web-server

      - name: Attest web server production image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/atemail-web-server
          subject-digest: ${{ steps.publish_web_server.outputs.digest }}
          push-to-registry: true

      - name: Publish mail control service production image (multi-arch)
        id: publish_mail_control_service
        uses: docker/build-push-action@v6
        with:
          context: ./apps/mail-control-service
          file: ./apps/mail-control-service/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_mail_control_service.outputs.tags }}
          labels: ${{ steps.meta_mail_control_service.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.image_metadata.outputs.build_date }}
            VCS_REF=${{ steps.image_metadata.outputs.vcs_ref }}
            VERSION=${{ steps.image_metadata.outputs.version }}
          cache-from: |
            type=gha,scope=prod-mail-control-service
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-mail-control-service:latest
          cache-to: |
            type=gha,mode=max,scope=prod-mail-control-service

      - name: Attest mail control service production image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/atemail-mail-control-service
          subject-digest: ${{ steps.publish_mail_control_service.outputs.digest }}
          push-to-registry: true

      - name: Publish at-email CLI production image (multi-arch)
        id: publish_at_email_cli
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/at-email-cli/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_at_email_cli.outputs.tags }}
          labels: ${{ steps.meta_at_email_cli.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.image_metadata.outputs.build_date }}
            VCS_REF=${{ steps.image_metadata.outputs.vcs_ref }}
            VERSION=${{ steps.image_metadata.outputs.version }}
          cache-from: |
            type=gha,scope=prod-at-email-cli
            type=registry,ref=ghcr.io/${{ github.repository }}/atemail-cli:latest
          cache-to: |
            type=gha,mode=max,scope=prod-at-email-cli

      - name: Attest at-email CLI production image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/atemail-cli
          subject-digest: ${{ steps.publish_at_email_cli.outputs.digest }}
          push-to-registry: true

      - name: Auth Helm to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Publish Helm chart
        id: publish_helm_chart
        env:
          CHART_SUBJECT_NAME: ghcr.io/${{ github.repository_owner }}/agentteam-email
          VERSION: ${{ needs.build_test.outputs.version }}
        run: |
          mkdir -p tmp/helm-package
          helm package charts/agentteam-email \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination tmp/helm-package
          helm push "tmp/helm-package/agentteam-email-${VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}"
          chart_digest="$(crane digest "${CHART_SUBJECT_NAME}:${VERSION}")"
          {
            echo "subject_name=${CHART_SUBJECT_NAME}"
            echo "subject_digest=${chart_digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Attest Helm chart
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.publish_helm_chart.outputs.subject_name }}
          subject-digest: ${{ steps.publish_helm_chart.outputs.subject_digest }}
          push-to-registry: true

      - name: Generate at-email CLI npm release packages
        run: node apps/at-email-cli/npm/generate-npm-packages.mjs --expected-version "${{ needs.build_test.outputs.version }}"

      - name: Validate at-email CLI npm release packages
        run: node apps/at-email-cli/npm/validate-npm-packages.mjs

      - name: Pack at-email CLI npm release packages
        run: node apps/at-email-cli/npm/pack-npm-packages.mjs

      - name: Attest at-email CLI npm package tarballs
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: apps/at-email-cli/dist/npm-packages/*.tgz

      - name: Publish at-email CLI npm packages
        run: |
          unset NODE_AUTH_TOKEN
          node apps/at-email-cli/npm/publish-npm-packages.mjs
