monorepo_root = true

[settings]
python.uv_venv_auto = true
experimental = true
node.corepack = true
unix_default_inline_shell_args = "bash -euo pipefail -c"

[hooks]
postinstall = "pnpm install --frozen-lockfile"

[tools]
go = "1.26.4"
node = "26.4.0"
"npm:pnpm" = "11.8.0"
podman = "5.8.2"
kubectl = "1.36.1"
kind = "0.32.0"
helm = "4.2.0"
shellcheck = "0.11.0"
yamllint = "1.38.0"
actionlint = "1.7.12"
gitleaks = "8.30.1"

[monorepo]
config_roots = [
  "docs",
  "charts",
  "apps/at-email-cli",
  "apps/mail-control-service",
  "apps/mail-control-service/test-containers/*",
  "apps/web-server",
  "test-containers/*",
]

[env]
_.file = ".env"
CONTAINER_ENGINE = "{{ get_env(name='CONTAINER_ENGINE', default='podman') }}"
# renovate: datasource=docker depName=docker.io/library/mongo versioning=docker
AT_EMAIL_ADMIN_DEV_MONGO_IMAGE = "docker.io/library/mongo:8.3.2"
# renovate: datasource=docker depName=docker.io/axllent/mailpit versioning=docker
AT_EMAIL_ADMIN_DEV_MAILPIT_IMAGE = "docker.io/axllent/mailpit:v1.30.1"
# renovate: datasource=docker depName=docker.io/minio/minio versioning=docker
AT_EMAIL_ADMIN_SMOKE_MINIO_IMAGE = "docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z"

[tasks."clean:tmp"]
description = "Remove contents of tmp/ directories under the workspace root"
dir = "{{config_root}}"
run = '''
find . -type d -name tmp -not -path '*/node_modules/*' -not -path '*/.git/*' | while read -r d; do
  echo "[clean:tmp] clearing ${d}"
  find "${d:?}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
done
'''

[tasks.build]
description = "Build all workspace packages"
run = "pnpm build"

[tasks.typecheck]
description = "Typecheck all workspace packages"
run = "pnpm typecheck"

[tasks.lint]
description = "Run repo lint checks"
run = [
  "pnpm lint",
  { task = "//:lint:yaml" },
  { task = "//:lint:actions" },
  { task = "//charts:lint" },
]

[tasks.format]
description = "Format repo Node and Go sources"
run = [
  { task = "//apps/mail-control-service:fmt" },
  { task = "//apps/at-email-cli:fmt" },
  "pnpm format",
]

[tasks."lint:yaml"]
description = "Lint static YAML files"
run = '''
git ls-files -z --cached --others --exclude-standard \
  '*.yaml' \
  '*.yml' \
  ':!:charts/agentteam-email/templates/**' \
  ':!:pnpm-lock.yaml' \
  | while IFS= read -r -d '' file; do
      [[ -f "${file}" ]] && printf '%s\0' "${file}"
    done \
  | xargs -0 -r yamllint -d '{extends: relaxed, rules: {line-length: disable}}'
'''

[tasks."lint:actions"]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks."leaks:check"]
description = "Scan the committed HEAD tree with gitleaks. Set GITLEAKS_LOG_OPTS to scan a custom Git range."
run = '''
if [[ -n "${GITLEAKS_LOG_OPTS:-}" ]]; then
  exec gitleaks git . --redact --log-opts="${GITLEAKS_LOG_OPTS}"
fi

scan_dir="$(mktemp -d)"
trap 'rm -rf "${scan_dir}"' EXIT
git archive --format=tar HEAD | tar -x -C "${scan_dir}"
exec gitleaks dir "${scan_dir}" --redact --config "${PWD}/.gitleaks.toml"
'''

[tasks.typegen]
description = "Regenerate committed service-boundary contracts"
depends = ["typegen:rpc-openapi"]

[tasks."typegen:rpc-openapi"]
description = "Regenerate the committed RPC OpenAPI schema"
run = "node scripts/generate-rpc-openapi.mjs"

[tasks."test:node"]
description = "Run workspace package unit tests"
run = "pnpm test"

[tasks.test]
description = "Run repo unit tests"
depends = [
  "//apps/mail-control-service:test",
  ":test:node",
]
run = "true"

[tasks."test:static"]
description = "Run static validation checks used by CI"
# Run these checks sequentially: lint and typecheck each let Turbo prepare
# package builds, so parallel mise schedulers can race on shared dist outputs.
run = [
  { task = ":lint" },
  { task = ":typecheck" },
  { task = ":leaks:check" },
  { task = ":test:charts" },
]

[tasks."test:charts"]
description = "Run offline Helm chart render checks"
depends = [
  "//charts:template",
]
run = "true"

[tasks."test:unit"]
description = "Run host-level unit and package checks used by CI"
run = [
  { task = ":test:node" },
  { task = "//apps/mail-control-service:check" },
  { task = "//apps/at-email-cli:fmt:check" },
  { task = "//apps/at-email-cli:mod:check" },
  { task = "//apps/at-email-cli:test" },
  { task = "//test-containers/cloudflare-oauth-prod-probe:test" },
]

[tasks."test:storybook:browsers"]
description = "Install Chromium dependencies for Storybook interaction tests"
run = "pnpm exec playwright install --with-deps chromium"

[tasks."test:storybook:test"]
description = "Run frontend Storybook interaction tests"
run = "pnpm exec turbo run storybook:test --filter=@main/frontend --output-logs=full --log-order=stream --ui=stream --summarize=false"

[tasks."storybook:build"]
description = "Build the frontend Storybook static artifact"
env = { STORYBOOK_BUILD_OUTPUT_DIR = "storybook-static" }
run = "pnpm exec turbo run storybook:build --filter=@main/frontend --output-logs=full --log-order=stream --ui=stream --summarize=false"

[tasks."test:storybook"]
description = "Run Storybook browser setup and interaction tests"
run = [
  { task = ":test:storybook:browsers" },
  { task = ":test:storybook:test" },
]

[tasks."test:images"]
description = "Build repo-owned runtime container images used by CI and E2E"
run = [
  { task = "//apps/mail-control-service:image:build" },
  { task = "//apps/web-server:image:build" },
  { task = "//apps/at-email-cli:image:build" },
]

[tasks."test:release-artifacts"]
description = "Validate at-email CLI release, npm, plugin, and skill artifacts"
run = [
  { task = "//apps/at-email-cli:release:check" },
  { task = "//apps/at-email-cli:release:npm:check" },
  { task = "//apps/at-email-cli:release:plugins:check" },
  { task = "//apps/at-email-cli:skills:check" },
]

[tasks."test:e2e:service"]
description = "Run service-owned Mail Control end-to-end suites"
depends = [
  "//apps/mail-control-service:test:e2e",
]
run = "true"

[tasks."test:e2e:node"]
description = "Run self-contained Node end-to-end harnesses"
run = [
  { task = "//test-containers/cloudflare-oauth-e2e:test" },
  { task = "//test-containers/paperclip-plugin-e2e:test" },
]

[tasks."test:e2e:auth"]
description = "Run auth E2E against the source-development stack"
depends = ["//test-containers/auth-e2e:test"]
depends_post = ["//:dev:stop"]
run = "true"

[tasks."test:e2e:kubernetes"]
description = "Run Kubernetes-backed end-to-end harnesses"
run = [
  { task = "//test-containers/kind-e2e:test" },
  { task = "//test-containers/full-stack-e2e:test" },
]

[tasks."test:e2e"]
description = "Run all end-to-end test-container flows"
run = [
  { task = ":test:e2e:service" },
  { task = ":test:e2e:node" },
  { task = ":test:e2e:auth" },
  { task = ":test:e2e:kubernetes" },
]

[tasks."test:ci"]
description = "Run the full CI validation gate against the example environment"
# Default to the checked-in example environment for CI parity, while allowing
# local worktrees to run the same gate against their isolated .env ports.
env = { _.file = "{{ get_env(name='AT_EMAIL_ADMIN_TEST_CI_ENV_FILE', default='.env.example') }}", CI = "true", DEBUG = "*", TEST_ARTIFACT_SUBMIT_SKIP = "1" }
run = [
  { task = ":test:static" },
  { task = ":build" },
  { task = ":test:unit" },
  { task = ":test:storybook" },
  { task = ":test:images" },
  { task = ":test:release-artifacts" },
  { task = ":test:e2e" },
]

[tasks."paperclip-plugin:start"]
description = "Start an isolated Paperclip sandbox with the local AgentTeam Email plugin installed"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:start"]
run = "true"

[tasks."paperclip-plugin:stop"]
description = "Stop the isolated Paperclip plugin sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:stop"]
run = "true"

[tasks."paperclip-plugin:status"]
description = "Print isolated Paperclip plugin sandbox status"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:status"]
run = "true"

[tasks."paperclip-plugin:logs"]
description = "Follow isolated Paperclip plugin sandbox logs"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:logs"]
run = "true"

[tasks."paperclip-plugin:install"]
description = "Rebuild and reinstall the local AgentTeam Email plugin into the running sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:install"]
run = "true"

[tasks."paperclip-plugin:seed"]
description = "Seed the running Paperclip plugin sandbox with the example workspace when empty"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:seed"]
run = "true"

[tasks."paperclip-plugin:smoke"]
description = "Smoke-check the isolated Paperclip plugin sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:smoke"]
run = "true"

[tasks."paperclip-plugin:reset"]
description = "Stop the isolated Paperclip plugin sandbox and remove sandbox volumes plus ignored artifacts"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:reset"]
run = "true"

[tasks."paperclip-plugin:preview:start"]
description = "Start an unauthenticated LAN preview proxy for the Paperclip plugin sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:preview:start"]
run = "true"

[tasks."paperclip-plugin:preview:stop"]
description = "Stop the unauthenticated LAN preview proxy"
depends = ["//test-containers/paperclip-plugin-e2e:preview:stop"]
run = "true"

[tasks."paperclip-plugin:preview:status"]
description = "Print unauthenticated LAN preview proxy status"
depends = ["//test-containers/paperclip-plugin-e2e:preview:status"]
run = "true"

[tasks."paperclip-plugin:preview:logs"]
description = "Follow unauthenticated LAN preview proxy logs"
depends = ["//test-containers/paperclip-plugin-e2e:preview:logs"]
run = "true"

[tasks."paperclip-plugin:preview:smoke"]
description = "Smoke-check the unauthenticated LAN preview proxy"
depends = ["//test-containers/paperclip-plugin-e2e:preview:smoke"]
run = "true"

[tasks."paperclip-plugin:preview:reset"]
description = "Stop the unauthenticated LAN preview proxy and remove preview volumes plus ignored artifacts"
depends = ["//test-containers/paperclip-plugin-e2e:preview:reset"]
run = "true"

[tasks."dev:start"]
description = "Start the local source-development support stack"
run = "bash scripts/dev-stack.sh start"

[tasks."dev:stop"]
description = "Stop the local source-development support stack"
run = "bash scripts/dev-stack.sh stop"

[tasks."dev:status"]
description = "Show local source-development support stack status"
run = "bash scripts/dev-stack.sh status"

[tasks."dev:logs"]
description = "Follow local source-development support stack logs"
run = "bash scripts/dev-stack.sh logs"

[tasks."dev:mail-control"]
description = "Run the Mail Control Service from source against the local dev stack"
run = "bash scripts/dev-mail-control.sh"

[tasks."stack:env"]
description = "Create the production-like local Compose env file when missing"
run = "bash scripts/local-compose.sh env"

[tasks."stack:config"]
description = "Render the production-like local Compose configuration"
depends = ["stack:env"]
run = "bash scripts/local-compose.sh config"

[tasks."stack:network"]
description = "Create the external production-like local Compose network"
run = "bash scripts/local-compose.sh network"

[tasks."stack:build"]
description = "Build first-party images for the production-like local Compose stack"
depends = ["stack:env"]
run = "bash scripts/local-compose.sh build"

[tasks."stack:up"]
description = "Build and start the production-like local Compose stack"
depends = ["stack:env", "stack:network"]
run = "bash scripts/local-compose.sh up"

[tasks."stack:down"]
description = "Stop the production-like local Compose stack without deleting volumes"
depends = ["stack:env"]
run = "bash scripts/local-compose.sh down"

[tasks."stack:status"]
description = "Show production-like local Compose stack status"
depends = ["stack:env"]
run = "bash scripts/local-compose.sh status"

[tasks."stack:logs"]
description = "Follow production-like local Compose stack logs"
depends = ["stack:env"]
run = "bash scripts/local-compose.sh logs"

[tasks."stack:smoke"]
description = "Smoke-check the production-like local Compose stack"
depends = ["stack:env"]
run = "bash scripts/local-compose.sh smoke"

[tasks.deploy]
description = "Build and start the production-like local Compose stack"
depends = ["stack:up"]
run = "true"

[tasks."deploy:build"]
description = "Build first-party images for the production-like local Compose stack"
depends = ["stack:build"]
run = "true"

[tasks."deploy:start"]
description = "Build and start the production-like local Compose stack"
depends = ["stack:up"]
run = "true"
