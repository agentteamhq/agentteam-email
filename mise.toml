monorepo_root = true

[settings]
python.uv_venv_auto = true
experimental = true
node.corepack = true
unix_default_inline_shell_args = "bash -euo pipefail -c"

[hooks]
postinstall = "pnpm install --frozen-lockfile"

[tools]
go = "1.26.4"
node = "24.16.0"
"npm:pnpm" = "11.4.0"
podman = "5.8.2"
kubectl = "1.36.1"
kind = "0.32.0"
helm = "4.2.0"
shellcheck = "0.11.0"
yamllint = "1.38.0"
actionlint = "1.7.12"

[monorepo]
config_roots = [
  "docs",
  "charts",
  "apps/at-email-cli",
  "apps/cloudflare-email-worker",
  "apps/mail-control-service",
  "apps/mail-control-service/test-containers/*",
  "apps/web-server",
  "test-containers/*",
]

[env]
CONTAINER_ENGINE = "podman"
_.file = ".env"
# renovate: datasource=docker depName=docker.io/library/mongo versioning=docker
AGENTTEAM_EMAIL_DEV_MONGO_IMAGE = "docker.io/library/mongo:8.2.7"
# renovate: datasource=docker depName=docker.io/axllent/mailpit versioning=docker
AGENTTEAM_EMAIL_DEV_MAILPIT_IMAGE = "docker.io/axllent/mailpit:v1.30.1"
# renovate: datasource=docker depName=docker.io/minio/minio versioning=docker
AGENTTEAM_EMAIL_SMOKE_MINIO_IMAGE = "docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z"

[tasks."clean:tmp"]
description = "Remove contents of tmp/ directories under the workspace root"
dir = "{{config_root}}"
run = '''
find . -type d -name tmp -not -path '*/node_modules/*' -not -path '*/.git/*' | while read -r d; do
  echo "[clean:tmp] clearing ${d}"
  find "${d:?}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
done
'''

[tasks.dev]
description = "Run the local frontend/server dev graph"
run = "pnpm dev"

[tasks.build]
description = "Build all workspace packages"
run = "pnpm build"

[tasks.typecheck]
description = "Typecheck all workspace packages"
run = "pnpm typecheck"

[tasks.lint]
description = "Run repo lint checks"
run = [
  "pnpm lint",
  { task = "//:lint:yaml" },
  { task = "//:lint:actions" },
  { task = "//charts:lint" },
]

[tasks.format]
description = "Format repo Node and Go sources"
run = [
  { task = "//apps/mail-control-service:fmt" },
  { task = "//apps/at-email-cli:fmt" },
  "pnpm format",
]

[tasks."lint:yaml"]
description = "Lint static YAML files"
run = '''
git ls-files -z --cached --others --exclude-standard \
  '*.yaml' \
  '*.yml' \
  ':!:charts/agentteam-email/templates/**' \
  ':!:pnpm-lock.yaml' \
  | xargs -0 -r yamllint -d '{extends: relaxed, rules: {line-length: disable}}'
'''

[tasks."lint:actions"]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.test]
description = "Run repo unit tests"
run = [
  { task = "//apps/mail-control-service:test" },
  "pnpm test",
]

[tasks.typegen]
description = "Regenerate committed service-boundary contracts"
depends = ["typegen:cloudflare-email-worker", "typegen:rpc-openapi"]

[tasks."typegen:cloudflare-email-worker"]
description = "Regenerate the checked-in Cloudflare Email Worker backend bundle"
run = "pnpm --filter agent-mail-cloudflare-worker run generate:backend-bundle"

[tasks."typegen:rpc-openapi"]
description = "Regenerate the committed RPC OpenAPI schema"
run = "node scripts/generate-rpc-openapi.mjs"

[tasks."test:e2e"]
description = "Run all end-to-end test-container flows"
depends = [
  "//apps/mail-control-service/test-containers/inbound-replay-smoke-e2e:test",
  "//test-containers/auth-e2e:test",
  "//test-containers/cloudflare-oauth-e2e:test",
  "//test-containers/paperclip-plugin-e2e:test",
  "//test-containers/kind-e2e:test",
  "//test-containers/full-stack-e2e:test",
]
run = "true"

[tasks."paperclip-plugin:start"]
description = "Start an isolated Paperclip sandbox with the local AgentTeam Email plugin installed"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:start"]
run = "true"

[tasks."paperclip-plugin:stop"]
description = "Stop the isolated Paperclip plugin sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:stop"]
run = "true"

[tasks."paperclip-plugin:status"]
description = "Print isolated Paperclip plugin sandbox status"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:status"]
run = "true"

[tasks."paperclip-plugin:logs"]
description = "Follow isolated Paperclip plugin sandbox logs"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:logs"]
run = "true"

[tasks."paperclip-plugin:install"]
description = "Rebuild and reinstall the local AgentTeam Email plugin into the running sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:install"]
run = "true"

[tasks."paperclip-plugin:seed"]
description = "Seed the running Paperclip plugin sandbox with the example workspace when empty"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:seed"]
run = "true"

[tasks."paperclip-plugin:smoke"]
description = "Smoke-check the isolated Paperclip plugin sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:smoke"]
run = "true"

[tasks."paperclip-plugin:reset"]
description = "Stop the isolated Paperclip plugin sandbox and remove sandbox volumes plus ignored artifacts"
depends = ["//test-containers/paperclip-plugin-e2e:sandbox:reset"]
run = "true"

[tasks."paperclip-plugin:preview:start"]
description = "Start an unauthenticated LAN preview proxy for the Paperclip plugin sandbox"
depends = ["//test-containers/paperclip-plugin-e2e:preview:start"]
run = "true"

[tasks."paperclip-plugin:preview:stop"]
description = "Stop the unauthenticated LAN preview proxy"
depends = ["//test-containers/paperclip-plugin-e2e:preview:stop"]
run = "true"

[tasks."paperclip-plugin:preview:status"]
description = "Print unauthenticated LAN preview proxy status"
depends = ["//test-containers/paperclip-plugin-e2e:preview:status"]
run = "true"

[tasks."paperclip-plugin:preview:logs"]
description = "Follow unauthenticated LAN preview proxy logs"
depends = ["//test-containers/paperclip-plugin-e2e:preview:logs"]
run = "true"

[tasks."paperclip-plugin:preview:smoke"]
description = "Smoke-check the unauthenticated LAN preview proxy"
depends = ["//test-containers/paperclip-plugin-e2e:preview:smoke"]
run = "true"

[tasks."paperclip-plugin:preview:reset"]
description = "Stop the unauthenticated LAN preview proxy and remove preview volumes plus ignored artifacts"
depends = ["//test-containers/paperclip-plugin-e2e:preview:reset"]
run = "true"

[tasks."db:setup"]
description = "Start the configured dev MongoDB database"
run = [
  { task = "db:start" },
  "printf 'MongoDB is ready. No schema migration is required.\\n'",
]

[tasks."db:start"]
description = "Start MongoDB container"
run = "bash scripts/dev-mongo.sh start"

[tasks."db:stop"]
description = "Stop MongoDB container"
run = "bash scripts/dev-mongo.sh stop"

[tasks."db:status"]
description = "Check MongoDB container status"
run = "bash scripts/dev-mongo.sh status"

[tasks."db:logs"]
description = "Tail MongoDB container logs"
run = "bash scripts/dev-mongo.sh logs"

[tasks."db:shell"]
description = "Open interactive mongosh shell to dev database"
run = "bash scripts/dev-mongo.sh shell"

[tasks."mail:start"]
description = "Start Mailpit container"
run = """
container_name="agentteam-email-mailpit"
mkdir -p ~/.local/share/agentteam-email/mailpit
"${CONTAINER_ENGINE}" rm -f "${container_name}" >/dev/null 2>&1 || true
"${CONTAINER_ENGINE}" run -d --name "${container_name}" \
  -e MP_MAX_MESSAGES=500 \
  -e MP_DATABASE=/data/mailpit.db \
  -e MP_SMTP_AUTH_ACCEPT_ANY=1 \
  -e MP_SMTP_AUTH_ALLOW_INSECURE=1 \
  -p 8025:8025 \
  -p 1025:1025 \
  -v ~/.local/share/agentteam-email/mailpit:/data:Z \
  "${AGENTTEAM_EMAIL_DEV_MAILPIT_IMAGE}"
echo "Mailpit started - Web UI: http://localhost:8025 | SMTP: localhost:1025"
"""

[tasks."mail:stop"]
description = "Stop Mailpit container"
run = '''
"${CONTAINER_ENGINE}" rm -f agentteam-email-mailpit
'''

[tasks."mail:status"]
description = "Check Mailpit container status"
run = '''
"${CONTAINER_ENGINE}" ps -a --filter name=agentteam-email-mailpit --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
'''

[tasks."mail:logs"]
description = "Tail Mailpit container logs"
run = '''
"${CONTAINER_ENGINE}" logs -f agentteam-email-mailpit
'''

[tasks.deploy]
description = "Build, deploy, and start production server locally"
run = "./apps/web-server/deploy-local.sh deploy"

[tasks."deploy:build"]
description = "Build and deploy locally without starting the server"
run = "./apps/web-server/deploy-local.sh build"

[tasks."deploy:start"]
description = "Start deployed server in foreground"
run = "./apps/web-server/deploy-local.sh start"
