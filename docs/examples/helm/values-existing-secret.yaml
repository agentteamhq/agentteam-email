namespace:
  create: true
  name: agentteam-email

publicHostname: https://mail.company.example

webServer:
  authSecret:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: BETTER_AUTH_SECRET
  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: ENCRYPT_SECRET_KEY

controlApi:
  token:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_CONTROL_API_TOKEN

wildduck:
  adminAccessToken:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_WILDDUCK_ADMIN_ACCESS_TOKEN
  accessControlSecret:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_WILDDUCK_ACCESS_CONTROL_SECRET

mailRuntime:
  loopSecret:
    value: '<random-mail-loop-secret>'
  zonemtaRelayPassword:
    value: '<random-zonemta-relay-password>'
  feedbackMailboxPassword:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_FEEDBACK_MAILBOX_PASSWORD

objectStorage:
  endpoint:
    value: 'https://<account-id>.r2.cloudflarestorage.com'
  region:
    value: auto
  bucket:
    value: company-agent-mail-archive
  accessKeyId:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_R2_ACCESS_KEY_ID
  secretAccessKey:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_R2_SECRET_ACCESS_KEY

cloudflare:
  apiBaseUrl: https://api.cloudflare.com/client/v4
  accountId:
    value: '<cloudflare-account-id>'
  apiToken:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_CLOUDFLARE_API_TOKEN
  worker:
    scriptName: agent-mail-ingress
    archiveBucket:
      value: company-agent-mail-archive

tunnel:
  provider: none
  listenUrl:
    value: http://0.0.0.0:8080
  externalUrl:
    value: https://mail-ingress.company.example/agent-mail/ingest/v1
  hmacSecret:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AGENT_MAIL_CF_TUNNEL_HMAC_SECRET

outbound:
  provider:
    value: cloudflare

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: mail.company.example
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.company.example
      secretName: mail-company-example-tls
