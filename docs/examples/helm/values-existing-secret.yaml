namespace:
  create: true
  name: agentteam-email

publicHostname: https://mail.company.example

webServer:
  authSecret:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AT_EMAIL_ADMIN_BETTER_AUTH_SECRET
  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AT_EMAIL_ADMIN_ENCRYPT_SECRET_KEY

controlApi:
  controlToWebToken:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AT_EMAIL_ADMIN_CONTROL_TO_WEB_API_TOKEN

wildduck:
  adminAccessToken:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AT_EMAIL_ADMIN_WILDDUCK_ADMIN_ACCESS_TOKEN
  accessControlSecret:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AT_EMAIL_ADMIN_WILDDUCK_ACCESS_CONTROL_SECRET

mailRuntime:
  loopSecret:
    value: '<random-mail-loop-secret>'
  zonemtaRelayPassword:
    value: '<random-zonemta-relay-password>'
  feedbackMailboxPassword:
    valueFrom:
      secretKeyRef:
        name: mail-secrets
        key: AT_EMAIL_ADMIN_FEEDBACK_MAILBOX_PASSWORD

admin:
  cloudflare:
    oauth:
      clientId:
        valueFrom:
          secretKeyRef:
            name: mail-secrets
            key: AT_EMAIL_ADMIN_CF_OAUTH_CLIENT_ID
    r2:
      accountId:
        value: '<cloudflare-account-id>'
      apiToken:
        valueFrom:
          secretKeyRef:
            name: mail-secrets
            key: AT_EMAIL_ADMIN_R2_API_TOKEN
      endpoint:
        value: 'https://<account-id>.r2.cloudflarestorage.com'
      region:
        value: auto
      bucket:
        value: company-agent-mail-archive
      accessKeyId:
        valueFrom:
          secretKeyRef:
            name: mail-secrets
            key: AT_EMAIL_ADMIN_R2_ACCESS_KEY_ID
      secretAccessKey:
        valueFrom:
          secretKeyRef:
            name: mail-secrets
            key: AT_EMAIL_ADMIN_R2_SECRET_ACCESS_KEY
  smtp:
    address:
      value: ''
    port:
      value: '1025'
    secureTls:
      value: 'false'
    username:
      value: ''
    password:
      value: ''
    fromEmail:
      value: ''
    replyToEmail:
      value: ''
    sendAsEmail:
      value: ''

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: mail.company.example
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.company.example
      secretName: mail-company-example-tls
