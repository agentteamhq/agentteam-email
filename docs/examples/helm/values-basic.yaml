namespace:
  create: true
  name: agentteam-email

publicHostname: https://mail.company.example

webServer:
  authSecret:
    value: '<random-secret>'
  encryptionKey:
    value: '<base64url-32-byte-key>'

controlApi:
  controlToWebToken:
    value: '<random-control-to-web-token>'

wildduck:
  adminAccessToken:
    value: '<random-wildduck-token>'
  accessControlSecret:
    value: '<random-wildduck-secret>'

mailRuntime:
  loopSecret:
    value: '<random-mail-loop-secret>'
  zonemtaRelayPassword:
    value: '<random-zonemta-relay-password>'
  feedbackMailboxPassword:
    value: '<random-feedback-mailbox-password>'

admin:
  cloudflare:
    oauth:
      clientId:
        value: '<cloudflare-oauth-client-id>'
      clientSecret:
        value: '<cloudflare-oauth-client-secret>'
    r2:
      accountId:
        value: '<cloudflare-account-id>'
      apiToken:
        value: '<r2-api-token>'
      endpoint:
        value: 'https://<account-id>.r2.cloudflarestorage.com'
      region:
        value: auto
      bucket:
        value: company-agent-mail-archive
      accessKeyId:
        value: '<r2-access-key>'
      secretAccessKey:
        value: '<r2-secret-key>'
  smtp:
    address:
      value: ''
    port:
      value: '1025'
    secureTls:
      value: 'false'
    username:
      value: ''
    password:
      value: ''
    fromEmail:
      value: ''
    replyToEmail:
      value: ''
    sendAsEmail:
      value: ''

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: mail.company.example
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.company.example
      secretName: mail-company-example-tls
