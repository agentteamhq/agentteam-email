[tasks."lint:missing-required"]
description = "Assert Helm lint fails when required operator values are omitted"
run = '''
mkdir -p tmp
if helm lint agentteam-email >tmp/lint-missing-required.out 2>tmp/lint-missing-required.err; then
  echo "expected helm lint without required operator values to fail" >&2
  exit 1
fi
grep -Eq "missing property|is required|value or .*valueFrom is required" tmp/lint-missing-required.out tmp/lint-missing-required.err
'''

[tasks."lint:basic"]
description = "Lint the AgentTeam Email Helm chart with the basic example values"
run = "helm lint agentteam-email -f ../docs/examples/helm/values-basic.yaml"

[tasks."lint:existing-secret"]
description = "Lint the AgentTeam Email Helm chart with the existing Secret example values"
run = "helm lint agentteam-email -f ../docs/examples/helm/values-existing-secret.yaml"

[tasks."lint:tailscale"]
description = "Lint the AgentTeam Email Helm chart with the Tailscale example values"
run = "helm lint agentteam-email -f ../docs/examples/helm/values-tailscale.yaml"

[tasks."lint:cloudflared"]
description = "Lint the AgentTeam Email Helm chart with the cloudflared example values"
run = "helm lint agentteam-email -f ../docs/examples/helm/values-cloudflared.yaml"

[tasks.lint]
description = "Lint the AgentTeam Email example values and verify missing required values fail"
depends = [
  ":lint:missing-required",
  ":lint:basic",
  ":lint:existing-secret",
  ":lint:tailscale",
  ":lint:cloudflared",
]
run = "true"

[tasks."template:missing-required"]
description = "Assert Helm render fails when required operator values are omitted"
run = '''
mkdir -p tmp
if helm template atemail agentteam-email --namespace agentteam-email >tmp/render-missing-required.yaml 2>tmp/render-missing-required.err; then
  echo "expected helm template without required operator values to fail" >&2
  exit 1
fi
grep -Eq "missing property|is required|value or .*valueFrom is required" tmp/render-missing-required.err
'''

[tasks."template:basic"]
description = "Render the AgentTeam Email Helm chart with the basic example values"
run = "mkdir -p tmp && helm template atemail agentteam-email --namespace agentteam-email -f ../docs/examples/helm/values-basic.yaml > tmp/render-basic.yaml"

[tasks."template:existing-secret"]
description = "Render the AgentTeam Email Helm chart with the existing Secret example values"
run = "mkdir -p tmp && helm template atemail agentteam-email --namespace agentteam-email -f ../docs/examples/helm/values-existing-secret.yaml > tmp/render-existing-secret.yaml"

[tasks."template:tailscale"]
description = "Render the AgentTeam Email Helm chart with the Tailscale example values"
run = "mkdir -p tmp && helm template atemail agentteam-email --namespace agentteam-email -f ../docs/examples/helm/values-tailscale.yaml > tmp/render-tailscale.yaml"

[tasks."template:cloudflared"]
description = "Render the AgentTeam Email Helm chart with the cloudflared example values"
run = "mkdir -p tmp && helm template atemail agentteam-email --namespace agentteam-email -f ../docs/examples/helm/values-cloudflared.yaml > tmp/render-cloudflared.yaml"

[tasks.template]
description = "Render the AgentTeam Email example values and verify missing required values fail"
depends = [
  ":template:missing-required",
  ":template:basic",
  ":template:existing-secret",
  ":template:tailscale",
  ":template:cloudflared",
]
run = "true"

[tasks."dry-run:basic"]
description = "Run Kubernetes client-side dry-run for the basic Helm render"
depends = [":template:basic"]
run = "kubectl apply --dry-run=client --validate=false -f tmp/render-basic.yaml >/dev/null"

[tasks."dry-run:existing-secret"]
description = "Run Kubernetes client-side dry-run for the existing Secret Helm render"
depends = [":template:existing-secret"]
run = "kubectl apply --dry-run=client --validate=false -f tmp/render-existing-secret.yaml >/dev/null"

[tasks."dry-run:tailscale"]
description = "Run Kubernetes client-side dry-run for the Tailscale Helm render"
depends = [":template:tailscale"]
run = "kubectl apply --dry-run=client --validate=false -f tmp/render-tailscale.yaml >/dev/null"

[tasks."dry-run:cloudflared"]
description = "Run Kubernetes client-side dry-run for the cloudflared Helm render"
depends = [":template:cloudflared"]
run = "kubectl apply --dry-run=client --validate=false -f tmp/render-cloudflared.yaml >/dev/null"

[tasks."dry-run"]
description = "Run Kubernetes client-side dry-run for all successful Helm renders"
depends = [
  ":dry-run:basic",
  ":dry-run:existing-secret",
  ":dry-run:tailscale",
  ":dry-run:cloudflared",
]
run = "true"

[tasks.check]
description = "Lint, render, and Kubernetes dry-run the AgentTeam Email Helm chart"
depends = [":lint", ":dry-run"]
run = "true"

[tasks.test]
description = "Run Helm chart validation"
depends = [":check"]
run = "true"
