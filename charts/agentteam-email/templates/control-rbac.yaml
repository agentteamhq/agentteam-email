apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.names.mailControlServiceAccount }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.mailControlService "component" "control") | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.names.webServerServiceAccount }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "web-server") | nindent 4 }}
{{ if eq .Values.tunnel.provider "tailscale" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.names.tailscaleState }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "tailscale") | nindent 4 }}
type: Opaque
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atemail-tailscale-state
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "tailscale") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.names.tailscaleState }}
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atemail-tailscale-state
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "tailscale") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.names.webServerServiceAccount }}
    namespace: {{ include "agentteam-email.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atemail-tailscale-state
{{- end }}
