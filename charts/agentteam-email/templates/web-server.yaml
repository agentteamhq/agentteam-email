apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.webServer }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "web-server") | nindent 4 }}
{{- with .Values.extraLabels.webServer }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.webServer.type }}
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.webServer) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.webServer.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.webServer }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "web-server") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.webServer) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.webServer "component" "web-server") | nindent 8 }}
{{- with .Values.extraLabels.webServer }}
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ .Values.names.webServerServiceAccount }}
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: web-server
          image: {{ include "agentteam-email.image" .Values.images.webServer | quote }}
          imagePullPolicy: {{ .Values.images.webServer.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 4321
          env:
            - name: NODE_ENV
{{- include "agentteam-email.envFor" (dict "root" . "name" "NODE_ENV") | nindent 14 }}
            - name: PORT
{{- include "agentteam-email.envFor" (dict "root" . "name" "PORT") | nindent 14 }}
            - name: FRONTEND_HOST
{{- include "agentteam-email.envFor" (dict "root" . "name" "FRONTEND_HOST") | nindent 14 }}
            - name: PUBLIC_HOSTNAME
{{- include "agentteam-email.envFor" (dict "root" . "name" "PUBLIC_HOSTNAME") | nindent 14 }}
            - name: DATABASE_URL
{{- include "agentteam-email.envFor" (dict "root" . "name" "DATABASE_URL") | nindent 14 }}
            - name: DATABASE_MAX_POOL_SIZE
{{- include "agentteam-email.envFor" (dict "root" . "name" "DATABASE_MAX_POOL_SIZE") | nindent 14 }}
            - name: MONGODB_URI
{{- include "agentteam-email.envFor" (dict "root" . "name" "MONGODB_URI") | nindent 14 }}
            - name: MONGODB_DATABASE
{{- include "agentteam-email.envFor" (dict "root" . "name" "MONGODB_DATABASE") | nindent 14 }}
            - name: TMP_DIR
{{- include "agentteam-email.envFor" (dict "root" . "name" "TMP_DIR") | nindent 14 }}
            - name: BETTER_AUTH_SECRET
{{- include "agentteam-email.envFor" (dict "root" . "name" "BETTER_AUTH_SECRET") | nindent 14 }}
            - name: ENCRYPT_SECRET_KEY
{{- include "agentteam-email.envFor" (dict "root" . "name" "ENCRYPT_SECRET_KEY") | nindent 14 }}
            - name: AGENT_MAIL_CONTROL_API_BASE_URL
{{- include "agentteam-email.envFor" (dict "root" . "name" "AGENT_MAIL_CONTROL_API_BASE_URL") | nindent 14 }}
            - name: AGENT_MAIL_CONTROL_API_TOKEN
{{- include "agentteam-email.envFor" (dict "root" . "name" "AGENT_MAIL_CONTROL_API_TOKEN") | nindent 14 }}
            - name: AGENT_MAIL_WILDDUCK_API_BASE_URL
{{- include "agentteam-email.envFor" (dict "root" . "name" "AGENT_MAIL_WILDDUCK_API_BASE_URL") | nindent 14 }}
            - name: AGENT_MAIL_WILDDUCK_ADMIN_ACCESS_TOKEN
{{- include "agentteam-email.envFor" (dict "root" . "name" "AGENT_MAIL_WILDDUCK_ADMIN_ACCESS_TOKEN") | nindent 14 }}
          {{- with .Values.extraEnv.webServer }}
{{ toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
          {{- with .Values.extraVolumeMounts.webServer }}
          volumeMounts:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources.webServer }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.extraVolumes.webServer }}
      volumes:
        {{- with .Values.extraVolumes.webServer }}
{{ toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
