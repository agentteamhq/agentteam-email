apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.wildduckApi }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.wildduckApi "component" "mail-store") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.wildduck) | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.wildduckImap }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.wildduckImap "component" "mail-store") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.wildduck) | nindent 4 }}
  ports:
    - name: imap
      port: 143
      targetPort: imap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.wildduck }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.wildduck "component" "mail-store") | nindent 4 }}
{{- with .Values.extraLabels.wildduck }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.wildduck) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.wildduck "component" "mail-store") | nindent 8 }}
{{- with .Values.extraLabels.wildduck }}
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: wildduck
          image: {{ include "agentteam-email.image" .Values.images.wildduck | quote }}
          imagePullPolicy: {{ .Values.images.wildduck.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          ports:
            - name: api
              containerPort: 8080
            - name: imap
              containerPort: 10143
          env:
            - name: APPCONF_api_accessToken
{{- include "agentteam-email.envFor" (dict "root" . "name" "AT_EMAIL_ADMIN_WILDDUCK_ADMIN_ACCESS_TOKEN") | nindent 14 }}
            - name: APPCONF_api_accessControl_secret
{{- include "agentteam-email.envFor" (dict "root" . "name" "AT_EMAIL_ADMIN_WILDDUCK_ACCESS_CONTROL_SECRET") | nindent 14 }}
          {{- with .Values.extraEnv.wildduck }}
{{ toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - 'wget -qO- --header="X-Access-Token: ${APPCONF_api_accessToken}" http://127.0.0.1:8080/health >/dev/null'
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'wget -qO- --header="X-Access-Token: ${APPCONF_api_accessToken}" http://127.0.0.1:8080/health >/dev/null'
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'wget -qO- --header="X-Access-Token: ${APPCONF_api_accessToken}" http://127.0.0.1:8080/health >/dev/null'
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: wildduck-config
              mountPath: /wildduck/config
          {{- with .Values.resources.wildduck }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: wildduck-config
          configMap:
            name: atemail-wildduck-config
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.haraka }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.haraka "component" "mail-ingest") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.haraka) | nindent 4 }}
  ports:
    - name: smtp
      port: 25
      targetPort: smtp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.haraka }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.haraka "component" "mail-ingest") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.haraka) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.haraka "component" "mail-ingest") | nindent 8 }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: haraka
          image: {{ include "agentteam-email.image" .Values.images.haraka | quote }}
          imagePullPolicy: {{ .Values.images.haraka.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          ports:
            - name: smtp
              containerPort: 10025
          readinessProbe:
            tcpSocket:
              port: smtp
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: smtp
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: haraka-config
              mountPath: /app/config
            - name: haraka-queue
              mountPath: /app/queue
          {{- with .Values.resources.haraka }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: haraka-config
          configMap:
            name: atemail-haraka-config
        - name: haraka-queue
{{ include "agentteam-email.storageVolumeSource" (dict "root" . "name" "harakaQueue") | nindent 10 }}
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
