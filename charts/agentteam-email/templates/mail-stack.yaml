apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.zonemta }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.zonemta "component" "mail-send") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.zonemta) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.zonemta "component" "mail-send") | nindent 8 }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: zonemta
          image: {{ include "agentteam-email.image" .Values.images.zonemta | quote }}
          imagePullPolicy: {{ .Values.images.zonemta.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          ports:
            - name: api
              containerPort: 12080
            - name: feeder
              containerPort: 2525
            - name: dsn
              containerPort: 2526
          readinessProbe:
            tcpSocket:
              port: api
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: api
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: zonemta-root-config
              mountPath: /app/config/zonemta.toml
              subPath: zonemta.toml
            - name: zonemta-root-config
              mountPath: /app/config/dbs-production.toml
              subPath: dbs-production.toml
            - name: zonemta-root-config
              mountPath: /app/config/queue.toml
              subPath: queue.toml
            - name: zonemta-root-config
              mountPath: /app/config/dns.toml
              subPath: dns.toml
            - name: zonemta-root-config
              mountPath: /app/config/pools.toml
              subPath: pools.toml
            - name: zonemta-root-config
              mountPath: /app/config/domains.toml
              subPath: domains.toml
            - name: zonemta-interfaces-config
              mountPath: /app/config/interfaces/feeder.toml
              subPath: feeder.toml
            - name: zonemta-interfaces-config
              mountPath: /app/config/interfaces/dsn.toml
              subPath: dsn.toml
            - name: zonemta-zones-config
              mountPath: /app/config/zones/default.toml
              subPath: default.toml
            - name: zonemta-zones-config
              mountPath: /app/config/zones/bounces.toml
              subPath: bounces.toml
            - name: zonemta-zones-config
              mountPath: /app/config/zones/routed.toml
              subPath: routed.toml
            - name: zonemta-plugins-config
              mountPath: /app/config/plugins/wildduck.toml
              subPath: wildduck.toml
            - name: zonemta-plugins-config
              mountPath: /app/config/plugins/default-headers.toml
              subPath: default-headers.toml
            - name: zonemta-plugins-config
              mountPath: /app/config/plugins/email-bounce.toml
              subPath: email-bounce.toml
            - name: zonemta-plugins-config
              mountPath: /app/config/plugins/agent-mail-provenance.toml
              subPath: agent-mail-provenance.toml
            - name: zonemta-plugin-code
              mountPath: /app/plugins/agent-mail-provenance.js
              subPath: agent-mail-provenance.js
          {{- with .Values.resources.zonemta }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: zonemta-root-config
          configMap:
            name: atemail-zonemta-root-config
        - name: zonemta-interfaces-config
          configMap:
            name: atemail-zonemta-interfaces-config
        - name: zonemta-zones-config
          configMap:
            name: atemail-zonemta-zones-config
        - name: zonemta-plugins-config
          configMap:
            name: atemail-zonemta-plugins-config
        - name: zonemta-plugin-code
          configMap:
            name: atemail-zonemta-plugin-code
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
