apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.rspamd }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.rspamd "component" "mail-filter") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.rspamd) | nindent 4 }}
  ports:
    - name: http
      port: 11333
      targetPort: rspamd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.rspamd }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.rspamd "component" "mail-filter") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.rspamd) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.rspamd "component" "mail-filter") | nindent 8 }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: rspamd
          image: {{ include "agentteam-email.image" .Values.images.rspamd | quote }}
          imagePullPolicy: {{ .Values.images.rspamd.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          ports:
            - name: rspamd
              containerPort: 11333
          readinessProbe:
            tcpSocket:
              port: rspamd
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: rspamd
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: rspamd-data
              mountPath: /var/lib/rspamd
            - name: rspamd-config
              mountPath: /etc/rspamd/local.d
          {{- with .Values.resources.rspamd }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: rspamd-data
{{ include "agentteam-email.storageVolumeSource" (dict "root" . "name" "rspamd") | nindent 10 }}
        - name: rspamd-config
          configMap:
            name: atemail-rspamd-config
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
