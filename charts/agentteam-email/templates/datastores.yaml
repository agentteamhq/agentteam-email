apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.mongodb }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.mongodb "component" "database") | nindent 4 }}
spec:
  type: ClusterIP
  publishNotReadyAddresses: true
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.mongodb) | nindent 4 }}
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.mongodb }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.mongodb "component" "database") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.mongodb) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/mongodb-config: {{ include "agentteam-email.configDataFromGlob" (dict "root" . "glob" "files/config/mongodb/*") | sha256sum }}
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.mongodb "component" "database") | nindent 8 }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      terminationGracePeriodSeconds: {{ .Values.mongodb.terminationGracePeriodSeconds }}
      containers:
        - name: mongodb
          image: {{ include "agentteam-email.image" .Values.images.mongodb | quote }}
          imagePullPolicy: {{ .Values.images.mongodb.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          command:
            - mongod
            - --config
            - /etc/mongod.conf
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - |
                    for _ in $(seq 1 60); do
                      if mongosh --host 127.0.0.1:27017 --quiet --eval 'db.adminCommand({ ping: 1 }).ok' >/dev/null 2>&1; then
                        break
                      fi
                      sleep 1
                    done
                    mongosh --host 127.0.0.1:27017 --quiet --eval '
                      const config = {
                        _id: {{ .Values.mongodb.replicaSetName | quote }},
                        members: [{ _id: 0, host: {{ printf "%s:27017" .Values.names.mongodb | quote }} }]
                      };
                      try {
                        const status = rs.status();
                        if (status.ok === 1) {
                          quit(0);
                        }
                      } catch (error) {
                        if (error.codeName === "NotYetInitialized" || /no replset config/i.test(String(error))) {
                          rs.initiate(config);
                          quit(0);
                        }
                        throw error;
                      }
                    '
          ports:
            - name: mongo
              containerPort: 27017
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  mongosh --host 127.0.0.1:27017 --quiet --eval 'try { const status = rs.status(); quit(status.ok === 1 ? 0 : 1); } catch (error) { quit(1); }'
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  mongosh --host 127.0.0.1:27017 --quiet --eval 'try { const status = rs.status(); quit(status.ok === 1 ? 0 : 1); } catch (error) { quit(1); }'
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - |
                  mongosh --host 127.0.0.1:27017 --quiet --eval 'try { const status = rs.status(); quit(status.ok === 1 ? 0 : 1); } catch (error) { quit(1); }'
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-config
              mountPath: /etc/mongod.conf
              subPath: mongod.conf
          {{- with .Values.resources.mongodb }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: mongodb-data
{{ include "agentteam-email.storageVolumeSource" (dict "root" . "name" "mongodb") | nindent 10 }}
        - name: mongodb-config
          configMap:
            name: atemail-mongodb-config
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.redis }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.redis "component" "cache") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.redis) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.redis }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.redis "component" "cache") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.redis) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.redis "component" "cache") | nindent 8 }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: redis
          image: {{ include "agentteam-email.image" .Values.images.redis | quote }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          command:
            - redis-server
            - /usr/local/etc/redis/redis.conf
          ports:
            - name: redis
              containerPort: 6379
          startupProbe:
            exec:
              command:
                - redis-cli
                - ping
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /usr/local/etc/redis/redis.conf
              subPath: redis.conf
          {{- with .Values.resources.redis }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: redis-data
{{ include "agentteam-email.storageVolumeSource" (dict "root" . "name" "redis") | nindent 10 }}
        - name: redis-config
          configMap:
            name: atemail-redis-config
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
