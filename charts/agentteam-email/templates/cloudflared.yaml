{{- if eq .Values.tunnel.provider "cloudflared" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.names.cloudflared }}
  namespace: {{ include "agentteam-email.namespace" . }}
  labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.cloudflared "component" "tunnel") | nindent 4 }}
{{- with .Values.extraLabels.cloudflared }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  replicas: {{ .Values.cloudflared.replicas }}
  selector:
    matchLabels:
{{ include "agentteam-email.selectorLabels" (dict "root" . "name" .Values.names.cloudflared) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "agentteam-email.componentLabels" (dict "root" . "name" .Values.names.cloudflared "component" "tunnel") | nindent 8 }}
{{- with .Values.extraLabels.cloudflared }}
{{ toYaml . | nindent 8 }}
{{- end }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: cloudflared
          image: {{ include "agentteam-email.cloudflaredImage" .Values.images.cloudflared | quote }}
          imagePullPolicy: {{ .Values.images.cloudflared.pullPolicy }}
{{ include "agentteam-email.securityContext" . | nindent 10 }}
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:{{ .Values.cloudflared.metricsPort }}
            - run
          env:
            - name: TUNNEL_TOKEN
{{- include "agentteam-email.envFor" (dict "root" . "name" "TUNNEL_TOKEN") | nindent 14 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.cloudflared.metricsPort }}
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          {{- with .Values.resources.cloudflared }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
{{ include "agentteam-email.podScheduling" . | nindent 6 }}
{{- end }}
