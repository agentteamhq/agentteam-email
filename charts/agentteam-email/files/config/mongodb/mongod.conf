storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      cacheSizeGB: {{ .Values.mongodb.wiredTiger.cacheSizeGB }}
      configString: {{ .Values.mongodb.wiredTiger.configString | quote }}

net:
  bindIpAll: true
  # Sized above the summed Agent Mail client pools so diagnostics and burst
  # work can connect while ZoneMTA, Haraka, WildDuck, and the mail control service run.
  maxIncomingConnections: {{ .Values.mongodb.maxIncomingConnections }}
  unixDomainSocket:
    enabled: false

replication:
  replSetName: {{ .Values.mongodb.replicaSetName | quote }}

setParameter:
  diagnosticDataCollectionEnabled: {{ .Values.mongodb.diagnosticDataCollectionEnabled }}
  shutdownTimeoutMillisForSignaledShutdown: {{ .Values.mongodb.shutdownTimeoutMillisForSignaledShutdown }}
