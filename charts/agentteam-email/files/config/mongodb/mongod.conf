storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.256
      configString: "eviction=(threads_min=1,threads_max=1),prefetch=(available=false,default=false)"

net:
  bindIpAll: true
  # Sized above the summed Agent Mail client pools so diagnostics and burst
  # work can connect while ZoneMTA, Haraka, WildDuck, and the mail control service run.
  maxIncomingConnections: {{ .Values.mongodb.maxIncomingConnections }}
  unixDomainSocket:
    enabled: false

replication:
  replSetName: {{ .Values.mongodb.replicaSetName | quote }}

setParameter:
  diagnosticDataCollectionEnabled: false
  shutdownTimeoutMillisForSignaledShutdown: {{ mul .Values.mongodb.terminationGracePeriodSeconds 1000 }}
