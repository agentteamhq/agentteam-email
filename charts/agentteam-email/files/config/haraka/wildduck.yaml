redis:
  host: '{{ .Values.names.redis }}'
  port: 6379
  db: 3

mongo:
  url: '{{ include "agentteam-email.mongodbUri" (dict "root" . "database" "wildduck" "options" "maxPoolSize=4&minPoolSize=0&maxIdleTimeMS=60000") }}'
  # Regression guard: Haraka performs inbound storage and native forwarding.
  # Its outbound sender DB must match ZoneMTA [dbs].sender, or WildDuck target
  # forwarding is queued into an undrained upstream-default database.
  sender: 'wildduck'

sender:
  zone: 'default'
  collection: 'zone-queue'
  gfs: 'mail'
  loopSecret: {{ include "agentteam-email.requiredBundledConfigValue" (dict "source" .Values.mailRuntime.loopSecret "name" "mailRuntime.loopSecret") | quote }}

attachments:
  type: 'gridstore'
  bucket: 'attachments'
  decodeBase64: true

limits:
  windowSize: 3600
  rcptIp: 100
  rcptWindowSize: 60
  rcpt: 60

rspamd:
  forwardSkip: 10
  blacklist:
    - DMARC_POLICY_REJECT
  responses:
    DMARC_POLICY_REJECT: "Unauthenticated email from {host} is not accepted due to domain's DMARC policy"

auth:
  dns:
    maxLookups: 50
  minBitLength: 1024

originalRcptHeader: 'X-Zone-Original-Rcpt'
