namespace:
  create: true
  name: agentteam-email

nameOverride: ''
fullnameOverride: ''

extraLabels:
  namespace: {}
  mailControlService: {}
  webServer: {}
  wildduck: {}

names:
  mailControlService: atemail-mail-control-service
  mailControlServiceAccount: atemail-mail-control-service
  webServer: atemail-web-server
  webServerServiceAccount: atemail-web-server
  mongodb: mongodb
  redis: redis
  rspamd: rspamd
  wildduck: wildduck
  wildduckApi: wildduck-api
  wildduckImap: wildduck-imap
  haraka: haraka
  zonemta: zonemta
  zonemtaApi: zonemta-api
  zonemtaFeeder: zonemta-feeder
  zonemtaDsn: zonemta-dsn

images:
  mailControlService:
    repository: ghcr.io/agentteamhq/agentteam-email/atemail-mail-control-service
    pullPolicy: Always
  webServer:
    repository: ghcr.io/agentteamhq/agentteam-email/atemail-web-server
    pullPolicy: Always
  mongodb:
    repository: docker.io/library/mongo
    tag: '8.3.2'
    pullPolicy: IfNotPresent
  redis:
    repository: docker.io/library/redis
    tag: '8.6.3'
    pullPolicy: IfNotPresent
  rspamd:
    repository: docker.io/rspamd/rspamd
    tag: '4.1.0'
    pullPolicy: IfNotPresent
  wildduck:
    repository: ghcr.io/zone-eu/wildduck
    tag: '1.48.2'
    pullPolicy: IfNotPresent
  haraka:
    repository: ghcr.io/zone-eu/haraka-plugin-wildduck
    tag: '5.8.41'
    pullPolicy: IfNotPresent
  zonemta:
    repository: ghcr.io/zone-eu/zonemta-wildduck
    tag: '1.32.30'
    pullPolicy: IfNotPresent

webServer:
  authSecret: {}
  encryptionKey: {}
  databaseMaxPoolSize: 8
  tmpDir:
    value: /tmp/agentteam-email

mailControlService: {}

mongodb:
  clientPools:
    control:
      maxIdleTimeMS: 60000
      maxPoolSize: 4
      minPoolSize: 0
    wildduck:
      maxIdleTimeMS: 60000
      maxPoolSize: 4
      minPoolSize: 0
  diagnosticDataCollectionEnabled: false
  maxIncomingConnections: 128
  nofile: 20000
  replicaSetName: rs0
  shutdownTimeoutMillisForSignaledShutdown: 120000
  terminationGracePeriodSeconds: 120
  wiredTiger:
    cacheSizeGB: 0.256
    configString: 'eviction=(threads_min=1,threads_max=1),prefetch=(available=false,default=false)'

controlApi:
  controlToWebToken: {}

wildduck:
  adminAccessToken: {}
  accessControlSecret: {}

mailRuntime:
  loopSecret: {}
  zonemtaRelayPassword: {}
  feedbackMailboxPassword: {}

admin:
  cloudflare:
    apiBaseUrl: https://api.cloudflare.com/client/v4
    oauth:
      authorizationUrl:
        value: ''
      clientId: {}
      issuer:
        value: ''
      revokeUrl:
        value: ''
      tokenUrl:
        value: ''
      userInfoUrl:
        value: ''
    r2:
      accountId: {}
      apiToken: {}
      endpoint: {}
      region:
        value: auto
      bucket: {}
      accessKeyId: {}
      secretAccessKey: {}
  socialAuth:
    google:
      clientId:
        value: ''
      clientSecret:
        value: ''
    linkedin:
      clientId:
        value: ''
      clientSecret:
        value: ''
  stripe:
    publishableKey:
      value: ''
    secretKey:
      value: ''
  smtp:
    address:
      value: ''
    fromEmail:
      value: ''
    password:
      value: ''
    port:
      value: '1025'
    replyToEmail:
      value: ''
    secureTls:
      value: 'false'
    sendAsEmail:
      value: ''
    username:
      value: ''
  trial:
    enabled:
      value: 'false'
    organizationId:
      value: ''
    domain:
      value: ''
    admissionToken:
      value: ''
    capabilities:
      value: email.status,email.message.list,email.message.read,email.message.search,email.message.create_draft,email.message.send,email.message.reply
    claimIntentTtlSeconds:
      value: '86400'
    dailySendLimit:
      value: '10'
    mailboxLifetimeSeconds:
      value: '604800'
    mailboxLocalPrefix:
      value: trial
    maxActive:
      value: '25'
    totalSendLimit:
      value: '50'

bundledConfig:
  enabled: true

persistence:
  enabled: true
  storageClassName: ''
  mongodb:
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  redis:
    size: 2Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  rspamd:
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  harakaQueue:
    size: 5Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''

service:
  webServer:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: ''
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  mailControlService: {}
  webServer: {}
  mongodb: {}
  redis: {}
  rspamd: {}
  wildduck: {}
  haraka: {}
  zonemta: {}

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

bundledContainerSecurityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv:
  mailControlService: []
  webServer: []
  wildduck: []

extraVolumes:
  mailControlService: []
  webServer: []

extraVolumeMounts:
  mailControlService: []
  webServer: []
