namespace:
  create: true
  name: agentteam-email

nameOverride: ''
fullnameOverride: ''

extraLabels:
  namespace: {}
  mailControlService: {}
  webServer: {}
  wildduck: {}

names:
  mailControlService: atemail-mail-control-service
  mailControlServiceAccount: atemail-mail-control-service
  webServer: atemail-web-server
  webServerServiceAccount: atemail-web-server
  mongodb: mongodb
  redis: redis
  rspamd: rspamd
  wildduck: wildduck
  wildduckApi: wildduck-api
  wildduckImap: wildduck-imap
  haraka: haraka
  zonemta: zonemta
  zonemtaApi: zonemta-api
  zonemtaFeeder: zonemta-feeder
  zonemtaDsn: zonemta-dsn

images:
  mailControlService:
    repository: ghcr.io/agentteamhq/agentteam-email/atemail-mail-control-service
    pullPolicy: Always
  webServer:
    repository: ghcr.io/agentteamhq/agentteam-email/atemail-web-server
    pullPolicy: Always
  mongodb:
    repository: docker.io/library/mongo
    tag: '8.3.2'
    pullPolicy: IfNotPresent
  redis:
    repository: docker.io/library/redis
    tag: '8.6.3'
    pullPolicy: IfNotPresent
  rspamd:
    repository: docker.io/rspamd/rspamd
    tag: '4.1.0'
    pullPolicy: IfNotPresent
  wildduck:
    repository: ghcr.io/zone-eu/wildduck
    tag: '1.48.2'
    pullPolicy: IfNotPresent
  haraka:
    repository: ghcr.io/zone-eu/haraka-plugin-wildduck
    tag: '5.8.41'
    pullPolicy: IfNotPresent
  zonemta:
    repository: ghcr.io/zone-eu/zonemta-wildduck
    tag: '1.32.30'
    pullPolicy: IfNotPresent

webServer:
  authSecret: {}
  encryptionKey: {}

controlApi:
  token: {}

wildduck:
  adminAccessToken: {}
  accessControlSecret: {}

mailRuntime:
  loopSecret: {}
  zonemtaRelayPassword: {}
  feedbackMailboxPassword: {}

objectStorage:
  endpoint: {}
  region:
    value: auto
  bucket: {}
  accessKeyId: {}
  secretAccessKey: {}

cloudflare:
  apiBaseUrl: https://api.cloudflare.com/client/v4
  accountId: {}
  apiToken: {}
  worker:
    scriptName: agent-mail-ingress
    archiveBucket: {}

outbound:
  provider:
    value: cloudflare

ses: {}

bundledConfig:
  enabled: true

persistence:
  enabled: true
  storageClassName: ''
  mongodb:
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  redis:
    size: 2Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  rspamd:
    size: 1Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''
  harakaQueue:
    size: 5Gi
    accessModes:
      - ReadWriteOnce
    existingClaim: ''

service:
  webServer:
    type: ClusterIP
    port: 80

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: ''
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  mailControlService: {}
  webServer: {}
  mongodb: {}
  redis: {}
  rspamd: {}
  wildduck: {}
  haraka: {}
  zonemta: {}

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv:
  mailControlService: []
  webServer: []
  wildduck: []

extraVolumes:
  mailControlService: []
  webServer: []

extraVolumeMounts:
  mailControlService: []
  webServer: []
